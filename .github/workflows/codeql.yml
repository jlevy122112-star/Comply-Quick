name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
        # Supported CodeQL languages:
        # 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript',
        # 'python', 'ruby', 'swift'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # If you have a custom query pack, uncomment:
          # queries: +security-and-quality

      # For JS/TS, autobuild is often unnecessary, but harmless.
      # Keep this if your repo has a build step CodeQL should observe.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
